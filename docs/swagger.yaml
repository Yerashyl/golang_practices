basePath: /
definitions:
  assignment1_internal_models.CreateTaskRequest:
    properties:
      title:
        example: Go to the gym
        type: string
    type: object
  assignment1_internal_models.PatchTaskRequest:
    properties:
      done:
        example: true
        type: boolean
    type: object
  assignment1_internal_models.Task:
    properties:
      done:
        type: boolean
      id:
        type: integer
      title:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server for assignment 1.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Tasks API
  version: "1.0"
paths:
  /external/todos:
    get:
      description: Fetch todos from an external JSON placeholder API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items: {}
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get external todos
      tags:
      - external
  /tasks:
    delete:
      description: Delete a task by ID
      parameters:
      - description: Task ID
        in: query
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Delete a task
      tags:
      - tasks
    get:
      consumes:
      - application/json
      description: Get a list of all tasks or a specific task by ID
      parameters:
      - description: Task ID
        in: query
        name: id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/assignment1_internal_models.Task'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Get tasks
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: Update the "done" status of an existing task
      parameters:
      - description: Task ID
        in: query
        name: id
        required: true
        type: integer
      - description: Task status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/assignment1_internal_models.PatchTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/assignment1_internal_models.Task'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Update a task's status
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Create a new task with a title
      parameters:
      - description: Task title
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/assignment1_internal_models.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/assignment1_internal_models.Task'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Create a new task
      tags:
      - tasks
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-KEY
    type: apiKey
swagger: "2.0"
